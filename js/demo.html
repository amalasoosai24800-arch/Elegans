  ```html
<!-- THREE CORE -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<!-- REQUIRED ADDONS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/FontLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/geometries/TextGeometry.js"></script>

<script>
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf5f5f5);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(5, 4, 7);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("canvas-container").appendChild(renderer.domElement);

// LIGHTS
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 10, 7);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff, 0.6));

// MATERIAL
const material = new THREE.MeshStandardMaterial({
  color: 0xffffff,
  roughness: 0.25,
  metalness: 0.1
});

// BAR FUNCTION
function createBar(length) {
  const geometry = new THREE.BoxGeometry(length, 0.4, 0.4);
  return new THREE.Mesh(geometry, material);
}

// TRIANGLE
const bar1 = createBar(4);
bar1.rotation.y = Math.PI / 6;

const bar2 = createBar(4);
bar2.position.set(2, 1.8, -1.8);
bar2.rotation.y = -Math.PI / 3;

const bar3 = createBar(4);
bar3.position.set(-2, 1.8, -1.8);
bar3.rotation.y = Math.PI / 3;

scene.add(bar1, bar2, bar3);

// LOAD FONT
const loader = new THREE.FontLoader();

loader.load(
  "https://threejs.org/examples/fonts/helvetiker_regular.typeface.json",
  function (font) {

    function createText(text, pos, rotY = 0) {
      const geo = new THREE.TextGeometry(text, {
        font: font,
        size: 0.3,
        height: 0.05
      });

      const mat = new THREE.MeshStandardMaterial({ color: 0x111111 });
      const mesh = new THREE.Mesh(geo, mat);

      mesh.position.copy(pos);
      mesh.rotation.y = rotY;

      scene.add(mesh);
    }

    createText("STRATEGY", new THREE.Vector3(-0.8, 0.5, 0), Math.PI / 6);
    createText("EXECUTION", new THREE.Vector3(1.2, 2.2, -1.8), -Math.PI / 3);
    createText("GROWTH", new THREE.Vector3(-2.8, 2.2, -1.8), Math.PI / 3);
  }
);

// ANIMATION
function animate() {
  requestAnimationFrame(animate);
  scene.rotation.y += 0.004;
  renderer.render(scene, camera);
}
animate();

// RESIZE
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
